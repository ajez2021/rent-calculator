<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rent Affordability Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Rent Affordability Calculator</h1>

  <label>Annual Income</label>
  <input type="number" id="income" placeholder="e.g. 85000"/>

  <label>Multiplier</label>
  <select id="multiplier">
    <option value="2.5">2.5x (Conservative)</option>
    <option value="3" selected>3x (Standard)</option>
    <option value="3.5">3.5x (Aggressive)</option>
  </select>

  <button onclick="calculate()">Calculate</button>

  <div class="results">
    <h2>Results</h2>
    <p id="output">Enter your income to begin</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
